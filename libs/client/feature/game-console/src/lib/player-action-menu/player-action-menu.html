<ion-list lines="none">
  <ion-list-header class="px-4 pt-3 pb-1">
    <ion-label class="m-0">
      <h2 class="text-lg font-bold">{{ player().firstName }} {{ player().lastName }}</h2>
      <p class="text-sm text-ap-muted">Jersey #{{ player().jerseyNumber }}</p>
    </ion-label>
  </ion-list-header>
  
  @if (isGoalkeeper()) {
    <ion-item button (click)="selectAction('BLOCKED_SHOT')">
      <ion-icon slot="start" name="shield-half-outline" color="primary"></ion-icon>
      <ion-label>Block Shot</ion-label>
    </ion-item>
    
    <ion-item button (click)="selectAction('BLOCKED_PENALTY')">
      <ion-icon slot="start" name="shield-outline" color="primary"></ion-icon>
      <ion-label>Block Penalty Kick</ion-label>
    </ion-item>
  }

  <ion-item button (click)="selectAction('GOAL')">
    <ion-icon slot="start" name="football-outline" color="dark"></ion-icon>
    <ion-label>Goal</ion-label>
  </ion-item>

  <ion-item button (click)="selectAction('OWN_GOAL')">
    <ion-icon slot="start" name="football-outline" color="danger"></ion-icon>
    <ion-label>Own Goal</ion-label>
  </ion-item>
  
  <ion-item button (click)="selectAction('ASSIST')">
    <ion-icon slot="start" name="star-outline" color="dark"></ion-icon>
    <ion-label>Assist</ion-label>
  </ion-item>
  
  <ion-item button (click)="selectAction('YELLOW_CARD')">
    <ion-icon slot="start" name="card-outline" color="warning"></ion-icon>
    <ion-label>Yellow Card</ion-label>
  </ion-item>
  
  <ion-item button (click)="selectAction('RED_CARD')">
    <ion-icon slot="start" name="card-outline" color="danger"></ion-icon>
    <ion-label>Red Card</ion-label>
  </ion-item>
</ion-list>
