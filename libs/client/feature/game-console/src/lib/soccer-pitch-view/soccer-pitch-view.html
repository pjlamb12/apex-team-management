<div class="pitch-container relative w-full h-full bg-green-700 overflow-hidden border-4 border-white rounded-lg shadow-inner">
  <!-- Pitch Markings -->
  <div class="absolute inset-0 pointer-events-none opacity-40">
    <!-- Half-way line -->
    <div class="absolute top-1/2 left-0 right-0 h-1 bg-white"></div>
    <!-- Center circle -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1/3 aspect-square border-4 border-white rounded-full"></div>
    <!-- Center spot -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full"></div>
    
    <!-- Top Penalty area -->
    <div class="absolute top-0 left-[20%] right-[20%] h-[15%] border-x-4 border-b-4 border-white"></div>
    <!-- Top Goal area -->
    <div class="absolute top-0 left-[35%] right-[35%] h-[5%] border-x-4 border-b-4 border-white"></div>
    
    <!-- Bottom Penalty area -->
    <div class="absolute bottom-0 left-[20%] right-[20%] h-[15%] border-x-4 border-t-4 border-white"></div>
    <!-- Bottom Goal area -->
    <div class="absolute bottom-0 left-[35%] right-[35%] h-[5%] border-x-4 border-t-4 border-white"></div>
  </div>

  <!-- Players -->
  <div *ngFor="let player of positionedPlayers(); trackBy: trackBySlot" 
       class="player-slot absolute -translate-x-1/2 -translate-y-1/2 cursor-pointer z-10 transition-all duration-500 ease-in-out"
       [class.selected]="selectedPlayerId() === player.id"
       [class.opacity-50]="stagedOutIds().has(player.id)"
       [class.grayscale]="stagedOutIds().has(player.id)"
       [style.left.%]="player.x"
       [style.top.%]="player.y"
       (click)="selectPlayer(player, $event)">
    
    <div class="flex flex-col items-center">
      <div 
        class="player-circle flex items-center justify-center w-10 h-10 rounded-full border-2 shadow-lg transition-all duration-200"
        [class.selected-circle]="selectedPlayerId() === player.id"
        [class.bg-blue-600]="selectedPlayerId() !== player.id"
        [class.bg-yellow-400]="selectedPlayerId() === player.id"
        [class.border-white]="selectedPlayerId() !== player.id"
        [class.border-ap-bg]="selectedPlayerId() === player.id"
      >
        <span class="text-white font-bold text-sm" [class.text-ap-bg]="selectedPlayerId() === player.id">
          {{ player.jerseyNumber || '?' }}
        </span>
      </div>
      <span class="player-name text-[10px] font-bold text-white bg-ap-bg/60 px-1.5 py-0.5 rounded shadow mt-1 whitespace-nowrap">
        {{ player.lastName }}
      </span>
      
      <!-- OUT Badge -->
      <div *ngIf="stagedOutIds().has(player.id)" 
           class="absolute -top-1 -right-1 bg-red-600 text-white text-[8px] font-black rounded-full w-4 h-4 flex items-center justify-center border border-white">
        OUT
      </div>
    </div>
  </div>

  <!-- Staged In Players (Overlays) -->
  <div *ngFor="let player of stagedInPlayers(); trackBy: trackBySlot" 
       class="player-slot absolute -translate-x-1/2 -translate-y-1/2 cursor-pointer z-20 transition-all duration-500 ease-in-out"
       [style.left.%]="player.x"
       [style.top.%]="player.y"
       (click)="selectPlayer(player, $event)">
    
    <div class="flex flex-col items-center">
      <div 
        class="player-circle flex items-center justify-center w-10 h-10 rounded-full border-2 border-dashed border-white bg-green-600/80 shadow-lg animate-pulse"
      >
        <span class="text-white font-bold text-sm">
          {{ player.jerseyNumber || '?' }}
        </span>
      </div>
      <span class="player-name text-[10px] font-bold text-white bg-green-800/80 px-1.5 py-0.5 rounded shadow mt-1 whitespace-nowrap border border-green-400/30">
        {{ player.lastName }}
      </span>
      
      <!-- IN Badge -->
      <div class="absolute -top-1 -right-1 bg-green-500 text-white text-[8px] font-black rounded-full w-4 h-4 flex items-center justify-center border border-white">
        IN
      </div>
    </div>
  </div>
</div>
