<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/teams/' + teamId()"></ion-back-button>
    </ion-buttons>
    <ion-title>
      @if (game()) {
        vs {{ game()!.opponent }}
      } @else {
        Live Console
      }
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Top Bar: Game Clock -->
  <div class="flex flex-col items-center gap-4 p-4 bg-gray-900 text-white">
    <app-clock-display></app-clock-display>

    <div class="flex gap-3">
      @if (!isRunning()) {
        <ion-button color="success" (click)="startClock()">Start</ion-button>
      } @else {
        <ion-button color="warning" (click)="stopClock()">Stop</ion-button>
      }
    </div>
  </div>

  <!-- Center Area: Soccer Pitch View -->
  <app-soccer-pitch-view
    [players]="stateService.activePlayers()"
    [selectedPlayerId]="selectedPlayerId()"
    (playerSelected)="handlePlayerSelection($event)"
  ></app-soccer-pitch-view>

  <!-- Bottom: Bench View -->
  <app-bench-view
    [players]="stateService.benchPlayers()"
    [selectedPlayerId]="selectedPlayerId()"
    (playerSelected)="handlePlayerSelection($event)"
  ></app-bench-view>

  <!-- Event Log -->
  <app-event-log></app-event-log>

  <!-- Player Action Popover -->
  <ion-popover
    [isOpen]="actionPlayer() !== null"
    [event]="popoverEvent()"
    (didDismiss)="actionPlayer.set(null); selectedPlayerId.set(null)"
  >
    @if (actionPlayer()) {
      <app-player-action-menu
        [player]="actionPlayer()!"
        (actionSelected)="handleAction($event)"
      ></app-player-action-menu>
    }
  </ion-popover>
</ion-content>
