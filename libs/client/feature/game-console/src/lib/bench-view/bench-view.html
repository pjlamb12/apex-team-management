<div class="bench-container p-4">
  <h2 class="text-xl font-bold mb-4">Bench</h2>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-2 lg:gap-4">
    @for (player of players(); track player.id) {
      <ion-card
        (click)="selectPlayer(player, $event)"
        [class.selected]="selectedPlayerId() === player.id"
        [class.border-2]="stagedInIds().has(player.id)"
        [class.border-green-500]="stagedInIds().has(player.id)"
        class="m-0 cursor-pointer transition-all duration-200"
      >
        <ion-card-header>
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="jersey-number">#{{ player.jerseyNumber }}</div>
              <div class="player-name">{{ player.firstName }} {{ player.lastName }}</div>
            </div>
            <div class="flex flex-col items-end">
              <div class="text-[10px] font-mono text-ap-muted font-bold">{{ formatPlaytime(player.id) }}</div>
              @if (stagedInIds().has(player.id)) {
                <div class="staged-badge mt-1 bg-green-500 text-white text-[10px] font-black px-2.5 py-1 rounded-full animate-pulse border border-white/20">
                  STAGED
                </div>
              }
            </div>
          </div>
        </ion-card-header>
      </ion-card>
    }
  </div>
</div>
