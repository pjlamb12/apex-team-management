<div class="bench-container p-4">
  <h2 class="text-xl font-bold mb-4">Bench</h2>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-2 lg:gap-4">
    <ion-card
      *ngFor="let player of players()"
      (click)="selectPlayer(player, $event)"
      [class.selected]="selectedPlayerId() === player.id"
      class="m-0 cursor-pointer transition-all duration-200"
    >
      <ion-card-header>
        <div class="jersey-number">#{{ player.jerseyNumber }}</div>
        <div class="player-name">{{ player.firstName }} {{ player.lastName }}</div>
      </ion-card-header>
    </ion-card>
  </div>
</div>
