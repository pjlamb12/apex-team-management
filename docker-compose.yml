version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: apex-team-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apex_team
    volumes:
      - apex-team-db-data:/var/lib/postgresql/data

volumes:
  apex-team-db-data:
