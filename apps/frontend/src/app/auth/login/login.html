<ion-content class="ion-padding">
  <div class="min-h-screen flex items-center justify-center">
    <ion-card class="w-full max-w-sm">
      <ion-card-header class="text-center">
        <ion-card-title class="text-2xl font-bold tracking-tight text-white">Apex Team</ion-card-title>
        <p class="text-sm text-gray-400 mt-1">Coach Login</p>
      </ion-card-header>

      <ion-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <ngx-control-errors-display>
            <ion-item>
              <ion-input
                label="Email"
                labelPlacement="floating"
                type="email"
                formControlName="email"
                autocomplete="email"
              />
            </ion-item>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-input
                label="Password"
                labelPlacement="floating"
                type="password"
                formControlName="password"
                autocomplete="current-password"
              />
            </ion-item>
          </ngx-control-errors-display>

          @if (errorMessage()) {
            <ion-text color="danger">
              <p class="text-sm mt-2">{{ errorMessage() }}</p>
            </ion-text>
          }

          <ion-button
            type="submit"
            expand="block"
            class="mt-4"
            [disabled]="isLoading()"
          >
            {{ isLoading() ? 'Signing in...' : 'Sign In' }}
          </ion-button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-4">
          Don't have an account?
          <a routerLink="/signup" class="text-primary font-medium">Sign up</a>
        </p>

        <p class="text-center text-sm mt-2">
          <a routerLink="/reset-password" class="text-gray-400 hover:text-gray-300">Forgot password?</a>
        </p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
