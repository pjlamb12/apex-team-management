<ion-content class="ion-padding">
  <div class="min-h-screen flex items-center justify-center">
    <ion-card class="w-full max-w-sm text-center">
      <ion-card-header>
        <ion-card-title class="text-2xl font-bold text-ap-text">Apex Team</ion-card-title>
        <p class="text-sm text-ap-muted mt-1">You're logged in!</p>
      </ion-card-header>
      <ion-card-content>
        <p class="text-ap-muted mb-4">Team management coming in Phase 3.</p>
        <ion-button expand="block" color="medium" (click)="logout()">
          Log Out
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
