<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/teams/' + teamId() + '/settings/seasons'"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit() ? 'Edit Season' : 'New Season' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="submit()" [disabled]="isSaving()">
        <ion-icon slot="icon-only" name="save-outline" *ngIf="!isSaving()"></ion-icon>
        <ion-spinner *ngIf="isSaving()"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="p-4 max-w-2xl mx-auto">
    <div *ngIf="isLoading()" class="flex justify-center p-8">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!isLoading()">
      <ion-list lines="none" class="bg-transparent">
        <ngx-control-errors-display>
          <ion-item class="rounded-xl mb-4 shadow-sm border border-border">
            <ion-label position="stacked">Season Name</ion-label>
            <ion-input
              formControlName="name"
              placeholder="e.g. Fall 2026"
              type="text"
            ></ion-input>
          </ion-item>
        </ngx-control-errors-display>

        <ion-item class="rounded-xl mb-4 shadow-sm border border-border">
          <ion-label>Start Date</ion-label>
          <ion-datetime-button datetime="start-date"></ion-datetime-button>
          <ion-modal [keepContentsMounted]="true">
            <ng-template>
              <ion-datetime
                id="start-date"
                presentation="date"
                formControlName="startDate"
              ></ion-datetime>
            </ng-template>
          </ion-modal>
        </ion-item>

        <ion-item class="rounded-xl mb-4 shadow-sm border border-border">
          <ion-label>End Date</ion-label>
          <ion-datetime-button datetime="end-date"></ion-datetime-button>
          <ion-modal [keepContentsMounted]="true">
            <ng-template>
              <ion-datetime
                id="end-date"
                presentation="date"
                formControlName="endDate"
              ></ion-datetime>
            </ng-template>
          </ion-modal>
        </ion-item>

        <ion-item class="rounded-xl mb-4 shadow-sm border border-border">
          <ion-label>Default Practice Location</ion-label>
          <ion-input
            formControlName="defaultPracticeLocation"
            placeholder="e.g. Riverside Park Field 3"
            type="text"
          ></ion-input>
        </ion-item>

        <ion-item class="rounded-xl mb-6 shadow-sm border border-border">
          <ion-label>Active Season</ion-label>
          <ion-toggle formControlName="isActive" slot="end"></ion-toggle>
        </ion-item>

        <div class="px-4 text-sm text-medium mb-8" *ngIf="form.get('isActive')?.value">
          Note: Activating this season will automatically de-activate other seasons for this team.
        </div>

        <div class="px-2" *ngIf="errorMessage()">
          <ion-text color="danger">
            <p>{{ errorMessage() }}</p>
          </ion-text>
        </div>

        <div class="p-2">
          <ion-button
            expand="block"
            type="submit"
            [disabled]="isSaving() || form.invalid"
            class="ion-margin-top"
          >
            <ion-icon slot="start" name="save-outline" *ngIf="!isSaving()"></ion-icon>
            <ion-spinner slot="start" *ngIf="isSaving()"></ion-spinner>
            {{ isEdit() ? 'Update Season' : 'Create Season' }}
          </ion-button>
        </div>
      </ion-list>
    </form>
  </div>
</ion-content>
