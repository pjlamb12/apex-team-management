<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/teams/' + teamId + '/schedule'" />
    </ion-buttons>
    <ion-title>Schedule Practice</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="flex items-start justify-center min-h-full pt-4">
    <ion-card class="w-full max-w-md">
      <ion-card-header class="px-6 pt-6 pb-2">
        <ion-card-title class="text-xl font-bold">New Practice</ion-card-title>
      </ion-card-header>

      <ion-card-content class="px-4 pt-4">
        <form [formGroup]="form" (ngSubmit)="submit()">
          <ngx-control-errors-display class="block">
            <ion-item>
              <ion-label position="fixed">Date & Time</ion-label>
              <ion-datetime-button datetime="practice-datetime"></ion-datetime-button>
            </ion-item>
            <ion-modal [keepContentsMounted]="true" class="ion-palette-dark">
              <ng-template>
                <ion-datetime
                  id="practice-datetime"
                  presentation="date-time"
                  formControlName="scheduledAt"
                  class="ion-palette-dark"
                ></ion-datetime>
              </ng-template>
            </ion-modal>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-input
                label="Location"
                labelPlacement="floating"
                type="text"
                formControlName="location"
                autocomplete="off"
                placeholder="e.g. West Field, Park A"
              />
            </ion-item>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-input
                label="Duration (minutes)"
                labelPlacement="floating"
                type="number"
                formControlName="durationMinutes"
                placeholder="e.g. 60"
              />
            </ion-item>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-input
                label="Notes"
                labelPlacement="floating"
                type="text"
                formControlName="notes"
                placeholder="e.g. Bring extra water"
              />
            </ion-item>
          </ngx-control-errors-display>

          @if (errorMessage()) {
            <ion-text color="danger">
              <p class="text-sm mt-2">{{ errorMessage() }}</p>
            </ion-text>
          }

          <ion-button
            type="submit"
            expand="block"
            class="mt-4"
            [disabled]="isSaving()"
          >
            {{ isSaving() ? 'Saving...' : 'Create Practice' }}
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
