<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/teams/' + teamId + '/schedule'" />
    </ion-buttons>
    <ion-title>Schedule Game</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="flex items-start justify-center min-h-full pt-4">
    <ion-card class="w-full max-w-md">
      <ion-card-header class="px-6 pt-6 pb-2">
        <ion-card-title class="text-xl font-bold">New Game Details</ion-card-title>
      </ion-card-header>

      <ion-card-content class="px-4 pt-4">
        <form [formGroup]="form" (ngSubmit)="submit()">
          <ngx-control-errors-display>
            <ion-item>
              <ion-input
                label="Opponent"
                labelPlacement="floating"
                type="text"
                formControlName="opponent"
                autocomplete="off"
                placeholder="e.g. Eagles SC"
              />
            </ion-item>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-label position="fixed">Date & Time</ion-label>
              <ion-datetime-button datetime="game-datetime"></ion-datetime-button>
            </ion-item>
            <ion-modal [keepContentsMounted]="true" class="ion-palette-dark">
              <ng-template>
                <ion-datetime
                  id="game-datetime"
                  presentation="date-time"
                  formControlName="scheduledAt"
                  class="ion-palette-dark"
                ></ion-datetime>
              </ng-template>
            </ion-modal>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-input
                label="Location"
                labelPlacement="floating"
                type="text"
                formControlName="location"
                autocomplete="off"
                placeholder="e.g. West Field, Park A"
              />
            </ion-item>
          </ngx-control-errors-display>

          <ngx-control-errors-display class="block mt-3">
            <ion-item>
              <ion-input
                label="Uniform Color"
                labelPlacement="floating"
                type="text"
                formControlName="uniformColor"
                autocomplete="off"
                placeholder="e.g. Away (Blue)"
              />
            </ion-item>
          </ngx-control-errors-display>

          <div class="mt-6 mb-2 px-4 text-xs font-bold uppercase tracking-wider text-gray-500">
            Game Format (from Season Defaults)
          </div>

          <ngx-control-errors-display>
            <ion-item>
              <ion-input
                label="Number of Periods"
                labelPlacement="floating"
                formControlName="periodCount"
                type="number"
              ></ion-input>
            </ion-item>
          </ngx-control-errors-display>

          <ngx-control-errors-display>
            <ion-item>
              <ion-input
                label="Period Length (minutes)"
                labelPlacement="floating"
                formControlName="periodLengthMinutes"
                type="number"
              ></ion-input>
            </ion-item>
          </ngx-control-errors-display>

          <ion-item lines="none" class="mt-2">
            <ion-toggle formControlName="isHomeGame" justify="space-between">
              Home Game?
            </ion-toggle>
          </ion-item>

          @if (errorMessage()) {
            <ion-text color="danger">
              <p class="text-sm mt-2">{{ errorMessage() }}</p>
            </ion-text>
          }

          <ion-button
            type="submit"
            expand="block"
            class="mt-4"
            [disabled]="isSaving()"
          >
            {{ isSaving() ? 'Saving...' : 'Create Game' }}
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
