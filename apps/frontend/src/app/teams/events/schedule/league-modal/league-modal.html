<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">Cancel</ion-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [strong]="true">Save</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">
    <ion-list class="space-y-4">
      <ion-item class="rounded-xl border border-ap-border" lines="none">
        <ion-label position="stacked" class="text-ap-muted uppercase text-[10px] font-bold tracking-widest">Name</ion-label>
        <ion-input formControlName="name" placeholder="e.g. Fall League, Mayor's Cup"></ion-input>
      </ion-item>

      <ion-item class="rounded-xl border border-ap-border" lines="none">
        <ion-label position="stacked" class="text-ap-muted uppercase text-[10px] font-bold tracking-widest">Type</ion-label>
        <ion-select formControlName="type" interface="popover" placeholder="Select Type">
          <ion-select-option value="league">League / Session</ion-select-option>
          <ion-select-option value="tournament">Tournament</ion-select-option>
          <ion-select-option value="cup">Cup / Playoff</ion-select-option>
          <ion-select-option value="other">Other</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item class="rounded-xl border border-ap-border" lines="none">
        <ion-toggle formControlName="isActive" justify="space-between">
          <ion-label>
            <h2 class="font-bold">Active Competition</h2>
            <p class="text-xs text-ap-muted">Show games for this competition by default.</p>
          </ion-label>
        </ion-toggle>
      </ion-item>
    </ion-list>
  </form>
</ion-content>
