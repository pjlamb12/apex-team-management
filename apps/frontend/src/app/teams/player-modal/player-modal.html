<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">Cancel</ion-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [strong]="true">Save</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="save()">
    <ion-item [class.ion-invalid]="form.get('firstName')?.invalid && form.get('firstName')?.touched">
      <ion-input
        label="First Name *"
        labelPlacement="stacked"
        formControlName="firstName"
        type="text"
        placeholder="Enter first name"
        errorText="First name is required."
      ></ion-input>
    </ion-item>

    <ion-item [class.ion-invalid]="form.get('lastName')?.invalid && form.get('lastName')?.touched">
      <ion-input
        label="Last Name *"
        labelPlacement="stacked"
        formControlName="lastName"
        type="text"
        placeholder="Enter last name"
        errorText="Last name is required."
      ></ion-input>
    </ion-item>

    <ion-item [class.ion-invalid]="form.get('jerseyNumber')?.invalid && form.get('jerseyNumber')?.touched">
      <ion-input
        label="Jersey Number *"
        labelPlacement="stacked"
        formControlName="jerseyNumber"
        type="number"
        placeholder="Enter jersey number"
        min="0"
        max="999"
        errorText="A valid jersey number (0-999) is required."
      ></ion-input>
    </ion-item>

    <ion-item [class.ion-invalid]="form.get('parentEmail')?.invalid && form.get('parentEmail')?.touched">
      <ion-input
        label="Parent / Guardian Email *"
        labelPlacement="stacked"
        formControlName="parentEmail"
        type="email"
        placeholder="Enter contact email"
        errorText="A valid email address is required."
      ></ion-input>
    </ion-item>
  </form>
</ion-content>
