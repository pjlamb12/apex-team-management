<ion-header>
  <ion-toolbar>
    <ion-title>Join Team</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">Cancel</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="submit()" [disabled]="joinCode().length !== 6 || isSubmitting()" color="primary">
        @if (isSubmitting()) {
          <ion-spinner name="crescent" slot="start" size="small" />
        }
        Join
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="max-w-md mx-auto flex flex-col items-center pt-6">
    <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4">
      <ion-icon name="people-outline" class="text-3xl" color="primary" />
    </div>

    <p class="text-sm text-ap-muted text-center leading-relaxed mb-6 px-2">
      Enter the 6-character code shared by your head coach to join their team.
    </p>

    <div class="w-full">
      <ion-item class="rounded-lg border border-ap-border overflow-hidden">
        <ion-input
          label="Join Code"
          labelPlacement="stacked"
          placeholder="e.g. A4K9X2"
          [value]="joinCode()"
          (ionInput)="onCodeInput($event)"
          maxlength="6"
          class="join-code-input"
        />
      </ion-item>

      <div class="flex justify-between items-center px-1 mt-1">
        <div class="flex-1">
          @if (errorMessage()) {
            <ion-text color="danger">
              <p class="text-sm">{{ errorMessage() }}</p>
            </ion-text>
          }
        </div>
        <p class="text-xs text-ap-muted">{{ joinCode().length }}/6</p>
      </div>
    </div>
  </div>
</ion-content>
