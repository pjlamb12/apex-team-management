<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/teams"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ team()?.name ?? 'Team Dashboard' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/teams', teamId, 'settings']" aria-label="Team settings">
        <ion-icon slot="icon-only" name="settings-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [value]="selectedSegment()" (ionChange)="onSegmentChange($event)">
      <ion-segment-button value="roster">
        <ion-label>Roster</ion-label>
      </ion-segment-button>
      <ion-segment-button value="schedule">
        <ion-label>Schedule</ion-label>
      </ion-segment-button>
      <ion-segment-button value="drills">
        <ion-label>Drills</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (isLoading()) {
    <div class="flex items-center justify-center h-full">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  } @else {
    @if (errorMessage()) {
      <ion-text color="danger">
        <p class="ion-padding">{{ errorMessage() }}</p>
      </ion-text>
    }

    <ion-router-outlet [animated]="false"></ion-router-outlet>
  }
</ion-content>
